name: Test Contracts

on:
  push:
    branches: [master]
    paths:
      - 'contract/**'
      - '.github/workflows/test-contracts.yml'
  pull_request:
    branches: [master]
    paths:
      - 'contract/**'

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          target: wasm32v1-none

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            contract/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('contract/Cargo.lock') }}

      - name: Run tests
        working-directory: contract
        run: cargo test
